<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Cruz exterior -->
  <line x1="16" y1="2" x2="16" y2="10" stroke="#00ffb4" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="16" y1="22" x2="16" y2="30" stroke="#00ffb4" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="2" y1="16" x2="10" y2="16" stroke="#00ffb4" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="22" y1="16" x2="30" y2="16" stroke="#00ffb4" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Círculo central -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#00ffb4" stroke-width="1" filter="url(#glow)"/>
  <!-- Esquinas decorativas -->
  <path d="M8 4 L4 4 L4 8" fill="none" stroke="#ff00aa" stroke-width="1" stroke-linecap="round"/>
  <path d="M24 4 L28 4 L28 8" fill="none" stroke="#ff00aa" stroke-width="1" stroke-linecap="round"/>
  <path d="M8 28 L4 28 L4 24" fill="none" stroke="#ff00aa" stroke-width="1" stroke-linecap="round"/>
  <path d="M24 28 L28 28 L28 24" fill="none" stroke="#ff00aa" stroke-width="1" stroke-linecap="round"/>
  <!-- Punto central -->
  <circle cx="16" cy="16" r="1.5" fill="#ff00aa"/>
</svg>
