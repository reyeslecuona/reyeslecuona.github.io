<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Flecha principal rellena negro -->
  <polygon points="4,2 4,26 10,20 14,30 17,29 13,19 22,19" fill="#000000" filter="url(#glow)"/>
  <!-- Contorno neón -->
  <polygon points="4,2 4,26 10,20 14,30 17,29 13,19 22,19" fill="none" stroke="#00ffb4" stroke-width="1.5" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Punto de click -->
  <circle cx="4" cy="2" r="1.5" fill="#ff00aa"/>
</svg>
